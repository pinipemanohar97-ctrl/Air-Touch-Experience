<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH | V5 EXTREME</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 1px solid rgba(0, 255, 255, 0.1); display: none; }
        #header { position: absolute; top: 30px; width: 100%; text-align: center; color: #00e5ff; }
        .title { font-size: 2.2rem; font-weight: 900; letter-spacing: 10px; margin: 0; text-shadow: 0 0 15px #00e5ff; }
        #status-box { margin-top: 15px; padding: 5px 15px; border: 1px solid #00e5ff; display: inline-block; font-size: 0.8rem; background: rgba(0, 229, 255, 0.05); }
        
        /* THE SKELETON MONITOR */
        #monitor-container {
            position: absolute; bottom: 80px; right: 20px; width: 150px; height: 110px;
            border: 1px solid #00e5ff; background: #000; overflow: hidden; display: none; z-index: 20;
        }
        #skeleton-canvas { width: 100%; height: 100%; transform: scaleX(-1); } /* Mirror view */
        #monitor-label { position: absolute; bottom: 195px; right: 20px; color: #00e5ff; font-size: 10px; z-index: 21; display: none; }

        #footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #444; font-size: 0.6rem; letter-spacing: 3px; }

        #terminal-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        #terminal-box { border: 1px solid #00e5ff; padding: 40px; text-align: center; background: rgba(0, 229, 255, 0.02); }
        .blink { animation: blinker 1.5s linear infinite; color: #00e5ff; font-weight: bold; letter-spacing: 2px; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal-screen" onclick="initializeSystem()">
        <div id="terminal-box">
            <div style="color: #00e5ff; font-size: 0.7rem; margin-bottom: 20px;">AUTHENTICATION REQUIRED...</div>
            <div class="blink">INITIALIZE NEURAL LINK</div>
            <div style="color: #444; font-size: 0.6rem; margin-top: 20px;">[ CLICK TO BEGIN SPATIAL INTERFACE ]</div>
        </div>
    </div>

    <div id="monitor-label">NEURAL SKELETON FEED</div>
    <div id="monitor-container">
        <canvas id="skeleton-canvas"></canvas>
    </div>

    <div id="hud">
        <div id="header">
            <div style="font-size: 0.5rem; letter-spacing: 5px; opacity: 0.7;">ADITYA DEGREE COLLEGE | VIZIANAGARAM</div>
            <h1 class="title">AIR-TOUCH</h1>
            <div id="status-box">SYSTEM SYNCING...</div>
        </div>
        <div id="footer">NEURAL INTERFACE - DEPT OF AI & DATA SCIENCE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geom = new THREE.DodecahedronGeometry(1, 0);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true });
        const core = new THREE.Mesh(geom, mat);
        scene.add(core);

        const pCount = 8000;
        const pGeom = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            pPos[i*3] = (Math.random() - 0.5) * 5;
            pPos[i*3+1] = (Math.random() - 0.5) * 5;
            pPos[i*3+2] = (Math.random() - 0.5) * 5;
        }
        pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ size: 0.008, color: 0xffffff, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(pGeom, pMat);
        scene.add(stars);

        camera.position.z = 4;

        let targetScale = 1;
        let targetColor = 0x00e5ff;

        // Skeleton Drawing Setup
        const canvasElement = document.getElementById('skeleton-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function onResults(results) {
            // Draw skeleton in monitor
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00e5ff', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});
                }
            }
            canvasCtx.restore();

            const status = document.getElementById('status-box');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const h = results.multiHandLandmarks[0];
                const d = Math.hypot(h[4].x - h[8].x, h[4].y - h[8].y);

                if (d < 0.08) {
                    targetScale = 0.5;
                    targetColor = 0x00ffcc;
                    status.innerText = "CORE: COMPRESSED";
                } else {
                    targetScale = d * 15;
                    targetColor = 0xff3300;
                    status.innerText = "CORE: SHATTERED";
                }
                scene.rotation.y = h[8].x * 4;
                scene.rotation.x = h[8].y * 2;
            } else {
                status.innerText = "SEARCHING FOR HAND...";
            }
        }

        function initializeSystem() {
            document.getElementById('terminal-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('monitor-container').style.display = 'block';
            document.getElementById('monitor-label').style.display = 'block';

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults(onResults);

            const video = document.createElement('video');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            core.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
            core.material.color.lerp(new THREE.Color(targetColor), 0.1);
            core.rotation.y += 0.01;
            
            const pos = pGeom.attributes.position.array;
            for(let i=0; i<pCount; i++) {
                pos[i*3] += (targetScale * 0.01) * (Math.random() - 0.5);
            }
            pGeom.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
