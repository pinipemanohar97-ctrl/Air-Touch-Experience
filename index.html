<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH | EXTREME</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #interface { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 2px solid rgba(0, 229, 255, 0.2); box-sizing: border-box; }
        #header { position: absolute; top: 20px; width: 100%; text-align: center; color: #00e5ff; }
        .glitch-title { font-size: 2.5rem; font-weight: 900; letter-spacing: 15px; margin: 0; text-shadow: 0 0 15px #00e5ff; }
        #data-stream { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #00e5ff; font-family: monospace; font-size: 0.6rem; line-height: 1.5; opacity: 0.5; }
        #footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="interface">
        <div id="header">
            <div style="font-size: 0.6rem; letter-spacing: 5px;">ADITYA DEGREE COLLEGE | VIZIANAGARAM</div>
            <h1 class="glitch-title">AIR-TOUCH</h1>
            <div id="status" style="margin-top: 10px; font-weight: bold;">[ SYSTEM READY ]</div>
        </div>
        <div id="data-stream">
            LATENCY: 14ms<br>FRAME: 60FPS<br>NEURAL_MAP: ACTIVE<br>GESTURE_RECOGNITION: ON<br>INTEGRITY: 100%
        </div>
        <div id="footer">SCAN TO EXPERIENCE | DEPT. OF AI & DATA SCIENCE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. THE FUTURISTIC OBJECT: TORUS KNOT
        const knotGeom = new THREE.TorusKnotGeometry(0.7, 0.2, 100, 16);
        const knotMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true });
        const core = new THREE.Mesh(knotGeom, knotMat);
        scene.add(core);

        // 2. THE COSMIC DUST (8000 PARTICLES)
        const pCount = 8000;
        const pGeom = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pOriginal = new Float32Array(pCount * 3);

        for (let i = 0; i < pCount; i++) {
            const r = 1.2 + Math.random() * 0.8;
            const theta = Math.random() * Math.PI * 2;
            pPos[i*3] = Math.cos(theta) * r;
            pPos[i*3+1] = (Math.random() - 0.5) * 0.5;
            pPos[i*3+2] = Math.sin(theta) * r;
            pOriginal.set([pPos[i*3], pPos[i*3+1], pPos[i*3+2]], i*3);
        }
        pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ size: 0.01, color: 0xffffff, transparent: true, opacity: 0.8 });
        const dust = new THREE.Points(pGeom, pMat);
        scene.add(dust);

        camera.position.z = 3.5;

        // --- GESTURE DYNAMICS ---
        let currentExplode = 1;
        let targetExplode = 1;

        function onResults(results) {
            if (results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const thumb = hand[4];
                const index = hand[8];
                const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));

                // Control Logic
                if (dist < 0.07) {
                    targetExplode = 0.5; // Compression
                    document.getElementById('status').innerText = "[ CORE STABILIZED ]";
                    document.getElementById('status').style.color = "#00ff88";
                } else {
                    targetExplode = dist * 12; // True Explosion
                    document.getElementById('status').innerText = "[ CORE CRITICAL ]";
                    document.getElementById('status').style.color = "#ff3300";
                }

                // Smooth Rotation
                scene.rotation.y = index.x * 5;
                scene.rotation.x = index.y * 5;
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
        hands.onResults(onResults);

        const video = document.createElement('video');
        const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); } });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            
            // Buttery Smooth Physics (Lerp)
            currentExplode += (targetExplode - currentExplode) * 0.1;
            
            // Apply to Core
            core.scale.set(currentExplode, currentExplode, currentExplode);
            core.rotation.y += 0.02;
            
            // Apply to Particles
            const pos = pGeom.attributes.position.array;
            for (let i = 0; i < pCount; i++) {
                pos[i*3] = pOriginal[i*3] * currentExplode;
                pos[i*3+1] = pOriginal[i*3+1] * currentExplode;
                pos[i*3+2] = pOriginal[i*3+2] * currentExplode;
            }
            pGeom.attributes.position.needsUpdate = true;
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
