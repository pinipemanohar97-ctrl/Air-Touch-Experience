<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH | Ultra-Max</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #00e5ff; pointer-events: none; z-index: 10; }
        .glitch { font-size: 2.5rem; font-weight: 900; letter-spacing: 12px; text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; }
        #status-bar { width: 200px; height: 4px; background: #222; margin: 10px auto; border-radius: 2px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: #00e5ff; transition: width 0.1s; }
        #footer { position: fixed; bottom: 15px; width: 100%; text-align: center; color: #00e5ff; font-size: 0.6rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 0.6rem; letter-spacing: 5px; color: #fff;">NEURAL INTERFACE V4.0</div>
        <div class="glitch">AIR-TOUCH</div>
        <div id="status">SYNCING WITH HAND...</div>
        <div id="status-bar"><div id="progress"></div></div>
    </div>

    <div id="footer">ADITYA DEGREE COLLEGE | AI & DATA SCIENCE DEPT.</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. THE EVOLVING CORE
        const coreGeom = new THREE.OctahedronGeometry(1, 4);
        const coreMat = new THREE.MeshPhongMaterial({ 
            color: 0x00e5ff, wireframe: true, shininess: 100, emissive: 0x004444 
        });
        const light = new THREE.PointLight(0x00e5ff, 2, 10);
        scene.add(light);
        const core = new THREE.Mesh(coreGeom, coreMat);
        scene.add(core);

        // 2. ULTRA-DENSITY COSMIC FIELD (10,000 Particles)
        const partCount = 10000;
        const partGeom = new THREE.BufferGeometry();
        const pos = new Float32Array(partCount * 3);
        const store = [];

        for (let i = 0; i < partCount; i++) {
            const r = 1.5 + Math.random() * 1.5;
            const a = Math.random() * Math.PI * 2;
            pos[i*3] = Math.cos(a) * r;
            pos[i*3+1] = (Math.random() - 0.5) * 0.5;
            pos[i*3+2] = Math.sin(a) * r;
            store.push({ r, a, y: pos[i*3+1], rand: Math.random() });
        }
        partGeom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const partMat = new THREE.PointsMaterial({ size: 0.008, color: 0xffffff, transparent: true, opacity: 0.7 });
        const system = new THREE.Points(partGeom, partMat);
        scene.add(system);

        camera.position.z = 4;

        let state = "idle";
        let bloom = 0;

        function updateSystem(dist, h) {
            const p = partGeom.attributes.position.array;
            const progress = document.getElementById('progress');
            const status = document.getElementById('status');

            if (dist < 0.08) {
                // MAXIMIZED PINCH: "The Singularity"
                state = "pinch";
                progress.style.width = "100%";
                status.innerText = "INTEGRITY: MAXIMUM";
                core.rotation.z += 0.2;
                core.scale.lerp(new THREE.Vector3(0.5, 0.5, 0.5), 0.2);
            } else {
                // EXPLOSION: "The Supernova"
                state = "explode";
                const pVal = Math.max(0, 100 - (dist * 200));
                progress.style.width = pVal + "%";
                status.innerText = "INTEGRITY: COMPROMISED";
                core.scale.lerp(new THREE.Vector3(dist*5, dist*5, dist*5), 0.1);
            }

            for (let i = 0; i < partCount; i++) {
                const idx = i * 3;
                if (state === "pinch") {
                    const tx = Math.cos(store[i].a) * store[i].r * 0.5;
                    const tz = Math.sin(store[i].a) * store[i].r * 0.5;
                    p[idx] += (tx - p[idx]) * 0.15;
                    p[idx+2] += (tz - p[idx+2]) * 0.15;
                } else {
                    p[idx] += (p[idx] - 0) * (dist * 0.1);
                    p[idx+1] += (p[idx+1] - 0) * (dist * 0.1);
                    p[idx+2] += (p[idx+2] - 0) * (dist * 0.1);
                }
            }
            partGeom.attributes.position.needsUpdate = true;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });
        hands.onResults(res => {
            if (res.multiHandLandmarks.length > 0) {
                const h = res.multiHandLandmarks[0];
                const d = Math.sqrt(Math.pow(h[4].x - h[8].x, 2) + Math.pow(h[4].y - h[8].y, 2));
                updateSystem(d, h);
                scene.rotation.y = h[8].x * 4;
                scene.rotation.x = h[8].y * 2;
            }
        });

        const video = document.createElement('video');
        const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); } });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            system.rotation.y += 0.001;
            core.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
