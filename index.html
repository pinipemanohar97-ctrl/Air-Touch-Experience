<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH | SATURN EDITION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #interface { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 2px solid rgba(0, 229, 255, 0.2); box-sizing: border-box; display: none; }
        #header { position: absolute; top: 20px; width: 100%; text-align: center; color: #ffcc00; }
        .glitch-title { font-size: 2.2rem; font-weight: 900; letter-spacing: 12px; margin: 0; text-shadow: 0 0 15px #ffcc00; }
        #status { margin-top: 10px; font-weight: bold; font-family: monospace; font-size: 0.9rem; color: #ffcc00; }
        #data-stream { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ffcc00; font-family: monospace; font-size: 0.6rem; line-height: 1.8; opacity: 0.6; }
        #footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; }
        #monitor-container { position: absolute; bottom: 70px; right: 20px; width: 120px; height: 90px; border: 1px solid #ffcc00; background: rgba(0,0,0,0.8); overflow: hidden; display: none; z-index: 20; }
        #skeleton-canvas { width: 100%; height: 100%; transform: scaleX(-1); }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #start-box { border: 1px solid #ffcc00; padding: 40px; text-align: center; background: rgba(255, 204, 0, 0.05); }
        .blink { animation: blinker 1.5s linear infinite; color: #ffcc00; font-weight: bold; letter-spacing: 3px; font-family: monospace; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="start-screen" onclick="launchExperience()">
        <div id="start-box">
            <div style="color: #ffcc00; font-size: 0.6rem; margin-bottom: 20px; font-family: monospace;">STATION: VIZIANAGARAM // ADITYA COLLEGE</div>
            <div class="blink">INITIALIZE SATURN CORE</div>
            <div style="color: #666; font-size: 0.5rem; margin-top: 20px; font-family: monospace;">[ TOUCH TO ESTABLISH NEURAL LINK ]</div>
        </div>
    </div>

    <div id="monitor-container"><canvas id="skeleton-canvas"></canvas></div>
    
    <div id="interface">
        <div id="header">
            <div style="font-size: 0.5rem; letter-spacing: 4px; opacity: 0.8;">DEPARTMENT OF AI & DATA SCIENCE</div>
            <h1 class="glitch-title">AIR-TOUCH</h1>
            <div id="status">[ SCANNING ]</div>
        </div>
        <div id="data-stream">
            OBJECT: SATURN_PRIME<br>PARTICLES: 15,000<br>ANCHOR: INDEX_FINGER<br>TRIGGER: THUMB_MIDDLE<br>STATUS: ENCRYPTED
        </div>
        <div id="footer">Aditya Degree College | Vizianagaram</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. CREATE SATURN (Planet + Rings)
        const saturnGroup = new THREE.Group();
        
        // Planet Core
        const planetGeom = new THREE.SphereGeometry(0.7, 32, 32);
        const planetMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true });
        const planet = new THREE.Mesh(planetGeom, planetMat);
        saturnGroup.add(planet);

        // Rings
        const ringGeom = new THREE.TorusGeometry(1.1, 0.05, 2, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true });
        const rings = new THREE.Mesh(ringGeom, ringMat);
        rings.rotation.x = Math.PI / 2.5;
        saturnGroup.add(rings);
        
        scene.add(saturnGroup);

        // 2. 15,000 PARTICLES (Atmosphere)
        const pCount = 15000;
        const pGeom = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pOriginal = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            const r = 1.5 + Math.random() * 2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            pPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            pPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            pPos[i*3+2] = r * Math.cos(phi);
            pOriginal.set([pPos[i*3], pPos[i*3+1], pPos[i*3+2]], i*3);
        }
        pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ size: 0.005, color: 0xffffff, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(pGeom, pMat);
        scene.add(stars);

        camera.position.z = 4;

        let currentExplode = 1;
        let targetExplode = 1;
        const canvasElement = document.getElementById('skeleton-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffcc00', lineWidth: 1});
                }
            }
            canvasCtx.restore();

            const statusTxt = document.getElementById('status');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const triggerDist = Math.hypot(hand[4].x - hand[12].x, hand[4].y - hand[12].y);
                
                // Index Finger Rotation (Mirrored)
                saturnGroup.rotation.y = (0.5 - hand[8].x) * 6;
                saturnGroup.rotation.x = (hand[8].y - 0.5) * 4;

                if (triggerDist < 0.08) {
                    targetExplode = 0.35;
                    planetMat.color.setHex(0x00ff88); // THE COLOR FLIP: Neon Green
                    ringMat.color.setHex(0x00ff88);
                    statusTxt.innerText = "[ GRAVITY COLLAPSE: GREEN ]";
                } else {
                    targetExplode = triggerDist * 8;
                    planetMat.color.setHex(0xffcc00); // Back to Gold
                    ringMat.color.setHex(0xffcc00);
                    statusTxt.innerText = "[ EXPANDING NEBULA ]";
                }
            }
        }

        function launchExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('interface').style.display = 'block';
            document.getElementById('monitor-container').style.display = 'block';
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults(onResults);
            const video = document.createElement('video');
            video.setAttribute('playsinline', ''); 
            const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            currentExplode += (targetExplode - currentExplode) * 0.12;
            saturnGroup.scale.set(currentExplode, currentExplode, currentExplode);
            
            const pos = pGeom.attributes.position.array;
            for (let i = 0; i < pCount; i++) {
                pos[i*3] = pOriginal[i*3] * (currentExplode * 1.5);
                pos[i*3+1] = pOriginal[i*3+1] * (currentExplode * 1.5);
                pos[i*3+2] = pOriginal[i*3+2] * (currentExplode * 1.5);
            }
            pGeom.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
