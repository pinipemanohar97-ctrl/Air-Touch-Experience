<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH LIVE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #00e5ff; z-index: 10; pointer-events: none; }
        #footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #555; font-size: 0.7rem; }
        /* Instant Start Button Overlay */
        #start-btn { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); color: #00e5ff; display: flex; 
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
            font-weight: bold; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="start-btn" onclick="startSystem()">CLICK TO START AIR-TOUCH</div>

    <div id="ui">
        <div style="font-size: 0.6rem; letter-spacing: 3px;">ADITYA DEGREE COLLEGE</div>
        <h1 style="letter-spacing: 10px; margin: 5px 0;">AIR-TOUCH</h1>
        <div id="status">CAMERA OFFLINE</div>
    </div>

    <div id="footer">Presented by AI & Data Science Department</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // 1. SETUP 3D SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geom = new THREE.DodecahedronGeometry(1, 0);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true });
        const core = new THREE.Mesh(geom, mat);
        scene.add(core);
        camera.position.z = 4;

        // 2. SIMPLIFIED GESTURE ENGINE
        let targetScale = 1;

        function onResults(results) {
            document.getElementById('status').innerText = "SYSTEM ACTIVE";
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const thumb = hand[4];
                const index = hand[8];
                
                // Distance between thumb and index
                const d = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                
                // The Logic: Simple and Responsive
                targetScale = d < 0.1 ? 0.4 : d * 10;
                
                // Rotate based on index finger
                core.rotation.y = index.x * 4;
                core.rotation.x = index.y * 4;
            }
        }

        // 3. START FUNCTION (Required for mobile browsers to allow camera)
        function startSystem() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').innerText = "INITIALIZING CAMERA...";

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults(onResults);

            const video = document.createElement('video');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            // Buttery smooth movement
            core.scale.x += (targetScale - core.scale.x) * 0.2;
            core.scale.y += (targetScale - core.scale.y) * 0.2;
            core.scale.z += (targetScale - core.scale.z) * 0.2;
            
            // Auto-rotation for "Life"
            core.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
