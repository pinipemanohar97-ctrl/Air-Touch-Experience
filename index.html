<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AIR-TOUCH | Aditya Degree College</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #00e5ff; pointer-events: none; z-index: 10; }
        .title { font-size: 2.5rem; font-weight: 900; letter-spacing: 15px; text-shadow: 0 0 20px #00e5ff; }
        #status { font-family: monospace; font-size: 1rem; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 0.7rem; letter-spacing: 3px;">ADITYA DEGREE COLLEGE VIZIANAGARAM</div>
        <div class="title">AIR-TOUCH</div>
        <div id="status">WAITING FOR HAND...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. THE CORE (Futuristic Crystal)
        const coreGeom = new THREE.IcosahedronGeometry(1, 1);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.8 });
        const core = new THREE.Mesh(coreGeom, coreMat);
        scene.add(core);

        // 2. THE PARTICLE RING (Saturn Style)
        const partCount = 1500;
        const partGeom = new THREE.BufferGeometry();
        const positions = new Float32Array(partCount * 3);
        const velocities = new Float32Array(partCount * 3);
        const ringData = [];

        for (let i = 0; i < partCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.5 + Math.random() * 0.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.2;
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            // Random blast directions for explosion
            velocities[i*3] = (Math.random() - 0.5) * 0.1;
            velocities[i*3+1] = (Math.random() - 0.5) * 0.1;
            velocities[i*3+2] = (Math.random() - 0.5) * 0.1;

            ringData.push({ angle, radius, y });
        }
        partGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const partMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true });
        const ring = new THREE.Points(partGeom, partMat);
        scene.add(ring);

        camera.position.z = 4;

        // Logic Variables
        let state = "pinch"; // pinch or explode
        let lerpVal = 0;

        function updateParticles() {
            const pos = partGeom.attributes.position.array;
            
            for (let i = 0; i < partCount; i++) {
                const idx = i * 3;
                if (state === "pinch") {
                    // Pull back to ring shape
                    const targetX = Math.cos(ringData[i].angle) * ringData[i].radius;
                    const targetZ = Math.sin(ringData[i].angle) * ringData[i].radius;
                    pos[idx] += (targetX - pos[idx]) * 0.1;
                    pos[idx+1] += (ringData[i].y - pos[idx+1]) * 0.1;
                    pos[idx+2] += (targetZ - pos[idx+2]) * 0.1;
                    core.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                    core.material.color.setHex(0x00e5ff);
                } else {
                    // Explode outward
                    pos[idx] += (pos[idx] - 0) * 0.05; 
                    pos[idx+1] += (pos[idx+1] - 0) * 0.05;
                    pos[idx+2] += (pos[idx+2] - 0) * 0.05;
                    core.scale.lerp(new THREE.Vector3(2, 2, 2), 0.05);
                    core.material.color.setHex(0xff3300);
                }
            }
            partGeom.attributes.position.needsUpdate = true;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
        hands.onResults(res => {
            if (res.multiHandLandmarks.length > 0) {
                const h = res.multiHandLandmarks[0];
                const dist = Math.sqrt(Math.pow(h[4].x - h[8].x, 2) + Math.pow(h[4].y - h[8].y, 2));
                state = dist < 0.07 ? "pinch" : "explode";
                document.getElementById('status').innerText = state === "pinch" ? "CORE STABLE" : "CORE CRITICAL: EXPLODING";
                
                // Rotation follow
                scene.rotation.y = h[8].x * 4;
                scene.rotation.x = h[8].y * 2;
            }
        });

        const video = document.createElement('video');
        const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            updateParticles();
            ring.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
