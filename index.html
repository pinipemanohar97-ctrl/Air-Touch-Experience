<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR-TOUCH | Aditya Degree College Vizianagaram</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-overlay {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: #00e5ff; pointer-events: none; z-index: 10;
        }
        #footer-thanks {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.6); font-size: 0.8rem; z-index: 10;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div style="letter-spacing: 3px; font-size: 0.8rem;">ADITYA DEGREE COLLEGE, VIZIANAGARAM</div>
        <h1 style="letter-spacing: 8px; margin: 5px 0;">AIR-TOUCH</h1>
        <div id="status" style="color: #00ff88;">AI NEURAL ENGINE ACTIVE</div>
        <p id="gesture-hint" style="color: #888; font-size: 0.7rem;">Pinch fingers to Assemble | Open hand to Explode</p>
    </div>

    <div id="footer-thanks">
        Thank you for visiting the AIR-TOUCH Exhibit. <br>
        AI & Data Science Project
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- SATURN PHYSICS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create Saturn Particles
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.PointsMaterial({ color: 0x00e5ff, size: 0.02 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        camera.position.z = 3;

        // --- GESTURE LOGIC ---
        function handleGestures(landmarks) {
            const thumb = landmarks[4];
            const index = landmarks[8];
            const middle = landmarks[12];

            // 1. ROTATION (Index Finger Position)
            particles.rotation.y = index.x * 5;
            particles.rotation.x = index.y * 5;

            // 2. PINCH vs EXPLODE (Distance Calculation)
            const dist = Math.sqrt(
                Math.pow(thumb.x - index.x, 2) + 
                Math.pow(thumb.y - index.y, 2)
            );

            if (dist < 0.05) {
                // PINCH: Saturn stays together
                particles.scale.set(1, 1, 1);
                document.getElementById('status').innerText = "SYSTEM: ASSEMBLED";
            } else if (dist > 0.2) {
                // WIDE OPEN: Saturn explodes
                particles.scale.set(dist * 5, dist * 5, dist * 5);
                document.getElementById('status').innerText = "SYSTEM: EXPLODED";
            }
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults((results) => {
            if (results.multiHandLandmarks.length > 0) {
                handleGestures(results.multiHandLandmarks[0]);
            }
        });

        // Setup Camera
        const videoElement = document.createElement('video');
        const camera_proc = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera_proc.start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
